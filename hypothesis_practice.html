<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Hypothesis Testing Practice</title>

    <script src="stats.js"></script>

    <style>

        body {
            font-family: Arial;
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .problem {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
        }

        .answer {
            display: none;
            color: green;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <h1>Hypothesis Testing Practice</h1>

    <button onclick="generate()">Generate Problem</button>

    <div id="problems"></div>

    <script>function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function toggle(){
let el=document.getElementById("ans")
el.style.display = el.style.display==="none"?"block":"none"
}

function generate(){

let mu0=rand(50,100)
let mean=mu0 + rand(-10,10)
let sd=rand(5,15)
let n=rand(20,50)

let z=(mean-mu0)/(sd/Math.sqrt(n))

let decision = Math.abs(z) > 1.96 ? "Reject H₀" : "Fail to reject H₀"

document.getElementById("problems").innerHTML=

`
<div class="problem">

Test H₀: μ = ${mu0}<br>
Hₐ: μ ≠ ${mu0}<br><br>

Sample mean = ${mean}<br>
σ = ${sd}<br>
n = ${n}<br><br>

Conduct a hypothesis test at α = 0.05.

<br><button onclick="toggle()">Show Answer</button>

<div id="ans" class="answer">

Step 1: z = (x̄ − μ) / (σ / √n)<br>
z = (${mean} − ${mu0}) / (${sd} / √${n})<br>
z = ${z.toFixed(2)}<br><br>

Step 2: Critical values = ±1.96<br><br>

Decision: ${decision}

</div>

</div>
`

}</script>

</body>

</html>
