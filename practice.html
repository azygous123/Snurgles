<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Statistics Midterm Practice</title>

    <script src="stats2.js"></script>

    <style>

        body {
            font-family: Arial;
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .problem {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
        }

        .answer {
            display: none;
            margin-top: 10px;
            color: green;
        }

        button {
            margin-top: 10px;
        }

        .generate {
            display: block;
            margin: auto;
            margin-bottom: 20px;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>

</head>

<body>

    <h1>Statistics Midterm Practice</h1>

    <button class="generate" onclick="generateProblems()">Generate New Practice Set</button>

    <div id="problems"></div>

    <script>

        let questionBank = []

        fetch("questions2.json")
            .then(res => res.json())
            .then(data => {
                questionBank = data
            })


        function rand(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min
        }


        function toggle(id) {
            let el = document.getElementById(id)
            el.style.display = el.style.display === "none" ? "block" : "none"
        }


        function generateProblems() {

            let container = document.getElementById("problems")
            container.innerHTML = ""

            for (let i = 0; i < 6; i++) {

                let q = questionBank[Math.floor(Math.random() * questionBank.length)]

                let values = {}
                let text = q.template

                if (q.params) {

                    for (let key in q.params) {

                        let range = q.params[key]

                        let value = rand(range[0], range[1])

                        values[key] = value

                        text = text.replaceAll("{" + key + "}", value)

                    }

                }

                let answer = ""
                let steps = ""

                if (q.type === "zscore") {

                    let z = zscore(values.x, values.mu, values.sigma)

                    answer = z.toFixed(2)

                    steps =
                        "z = (x - μ) / σ<br>" +
                        "z = (" + values.x + " - " + values.mu + ") / " + values.sigma + "<br>" +
                        "z = " + answer

                }

                if (q.type === "binomial") {

                    let prob = binomial(values.n, values.k, q.p)

                    answer = prob.toFixed(4)

                    steps =
                        "P(X=k) = C(n,k)p^k(1-p)^(n-k)<br>" +
                        "P(X=" + values.k + ") = C(" + values.n + "," + values.k + ")(" + q.p + ")^" + values.k + "(1-" + q.p + ")^(" + (values.n - values.k) + ")<br>" +
                        "Probability = " + answer

                }

                if (q.type === "poisson") {

                    let prob = poisson(values.lambda, values.k)

                    answer = prob.toFixed(4)

                    steps =
                        "P(X=k) = (λ^k e^-λ) / k!<br>" +
                        "P(X=" + values.k + ") = (" + values.lambda + "^" + values.k + " e^-" + values.lambda + ") / " + values.k + "!<br>" +
                        "Probability = " + answer

                }

                if (q.type === "empirical") {

                    if (values.sd == 1) answer = "68%"
                    if (values.sd == 2) answer = "95%"
                    if (values.sd == 3) answer = "99.7%"

                    steps = "Empirical Rule:<br>1σ → 68%<br>2σ → 95%<br>3σ → 99.7%"

                }

                if (q.type === "distribution") {

                    answer = q.answer
                    steps = q.explanation

                }

                let div = document.createElement("div")
                div.className = "problem"

                div.innerHTML =

                    "<b>Problem " + (i + 1) + "</b><br><br>" +
                    text +
                    "<br><button onclick=\"toggle('ans" + i + "')\">Show Answer</button>" +
                    "<div id='ans" + i + "' class='answer'><b>Answer:</b> " + answer + "<br><br>" + steps + "</div>"

                container.appendChild(div)

            }

        }

    </script>

</body>
</html>
