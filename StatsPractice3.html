<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Statistics Midterm Trainer</title>

    <style>

        body {
            font-family: Arial;
            max-width: 1000px;
            margin: auto;
            background: #f0f0f0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.15);
        }

        button {
            padding: 6px 12px;
            margin-top: 10px;
        }

        .correct {
            color: green;
            font-weight: bold;
        }

        .wrong {
            color: red;
            font-weight: bold;
        }

        canvas {
            border: 1px solid #ccc;
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <h1>Statistics Midterm Trainer</h1>

    <div class="section">

        <h2>Score</h2>

        Correct: <span id="correct">0</span> |
        Wrong: <span id="wrong">0</span>

    </div>


    <div class="section">

        <h2>Guess the Distribution</h2>

        <button onclick="newDistribution()">New Question</button>

        <div id="distQuestion"></div>

    </div>


    <div class="section">

        <h2>Histogram Shape Identification</h2>

        <button onclick="newHistogram()">Generate Histogram</button>

        <canvas id="histogram" width="400" height="200"></canvas>

        <div>

            <button onclick="checkShape('left')">Left Skewed</button>
            <button onclick="checkShape('right')">Right Skewed</button>
            <button onclick="checkShape('symmetric')">Symmetric</button>

        </div>

        <div id="shapeResult"></div>

    </div>


    <div class="section">

        <h2>Normal Distribution Question</h2>

        <button onclick="normalQuestion()">Generate</button>

        <div id="normalProblem"></div>

    </div>


    <script>let correct=0
let wrong=0

function updateScore(){

document.getElementById("correct").innerText=correct
document.getElementById("wrong").innerText=wrong

}

function rand(min,max){

return Math.floor(Math.random()*(max-min+1))+min

}

//////////////////////////////
// Distribution Quiz
//////////////////////////////

let currentAnswer=""

function newDistribution(){

let r=rand(1,4)

let question=""

if(r==1){

question="Calls arrive at an average rate of 5 per minute."
currentAnswer="Poisson"

}

if(r==2){

question="10 coin flips. Count number of heads."
currentAnswer="Binomial"

}

if(r==3){

question="Human height with mean and standard deviation."
currentAnswer="Normal"

}

if(r==4){

question="Sample of 50 households chosen randomly."
currentAnswer="Sampling"

}

document.getElementById("distQuestion").innerHTML=

`
<p>${question}</p>

<button onclick="guess('Poisson')">Poisson</button>
<button onclick="guess('Binomial')">Binomial</button>
<button onclick="guess('Normal')">Normal</button>
<button onclick="guess('Sampling')">Sampling Method</button>

<div id="distResult"></div>
`

}

function guess(choice){

let result=document.getElementById("distResult")

if(choice==currentAnswer){

correct++
result.innerHTML="<span class='correct'>Correct!</span>"

}

else{

wrong++
result.innerHTML="<span class='wrong'>Wrong. Answer: "+currentAnswer+"</span>"

}

updateScore()

}

//////////////////////////////
// Histogram
//////////////////////////////

let shapeAnswer=""

function newHistogram(){

let canvas=document.getElementById("histogram")

let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,400,200)

let type=rand(1,3)

let heights=[]

if(type==1){

shapeAnswer="right"
heights=[80,70,60,40,30,20,10]

}

if(type==2){

shapeAnswer="left"
heights=[10,20,30,40,60,70,80]

}

if(type==3){

shapeAnswer="symmetric"
heights=[20,40,60,80,60,40,20]

}

for(let i=0;i<heights.length;i++){

ctx.fillRect(i*50,200-heights[i],30,heights[i])

}

}

function checkShape(choice){

let result=document.getElementById("shapeResult")

if(choice==shapeAnswer){

correct++
result.innerHTML="<span class='correct'>Correct</span>"

}

else{

wrong++
result.innerHTML="<span class='wrong'>Wrong. It was "+shapeAnswer+"</span>"

}

updateScore()

}

//////////////////////////////
// Normal Distribution
//////////////////////////////

function normalQuestion(){

let mu=rand(60,100)
let sd=rand(5,15)

let x=mu+rand(-2,2)*sd

let z=(x-mu)/sd

document.getElementById("normalProblem").innerHTML=

`
Mean μ = ${mu}<br>
Standard deviation σ = ${sd}<br>
x = ${x}<br><br>

Find the z-score.

<br><button onclick="showZ(${z})">Show Answer</button>

<div id="zAnswer"></div>
`

}

function showZ(z){

document.getElementById("zAnswer").innerHTML="z = "+z.toFixed(2)

}

newDistribution()</script>

</body>
</html>
