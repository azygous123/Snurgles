<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Statistics Exam Simulator</title>

    <script src="stats.js"></script>

    <style>

        body {
            font-family: Arial;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .problem {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        .answer {
            display: none;
            color: green;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 6px 12px;
        }
    </style>

</head>

<body>

    <h1>Statistics Problem Generator</h1>

    <button onclick="generate()">Generate Problem</button>

    <div id="problem"></div>

    <script>

        let questions = []

        fetch("questions.json")
            .then(res => res.json())
            .then(data => {
                questions = data
            })

        function rand(min, max) {

            return Math.floor(Math.random() * (max - min + 1)) + min

        }

        function generate() {

            let q = questions[Math.floor(Math.random() * questions.length)]

            let text = q.template

            let values = {}

            if (q.params) {

                for (let key in q.params) {

                    let r = q.params[key]

                    let v = rand(r[0], r[1])

                    values[key] = v

                    text = text.replace("{" + key + "}", v)

                }

            }

            let answer = ""

            if (q.type === "binomial") {

                answer = binomial(values.n, values.k, q.p).toFixed(4)

            }

            if (q.type === "poisson") {

                answer = poisson(values.lambda, values.k).toFixed(4)

            }

            if (q.type === "zscore") {

                answer = zscore(values.x, values.mu, values.sigma).toFixed(2)

            }

            if (q.type === "normalprob") {

                answer = normalCDF(values.z).toFixed(4)

            }

            if (q.type === "empirical") {

                if (values.sd == 1) answer = "68%"
                if (values.sd == 2) answer = "95%"
                if (values.sd == 3) answer = "99.7%"

            }

            document.getElementById("problem").innerHTML =

                `
<div class="problem">

${text}

<br>

<button onclick="toggle()">Show Answer</button>

<div id="answer" class="answer">

${answer}

</div>

</div>
`

        }

        function toggle() {

            let a = document.getElementById("answer")

            a.style.display = a.style.display === "none" ? "block" : "none"

        }

    </script>

</body>
</html>
